name: "精简版节点转换"

on:
  workflow_dispatch: # 支持手动点击运行
  schedule:
    - cron: '0 */6 * * *' # 每6小时跑一次

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install PyYAML
        run: pip install requests PyYAML

      - name: Run Script
        run: python main.py

      - name: Push Result
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add clash.yaml
          git commit -m "Update nodes: $(date)" || exit 0
          git push
