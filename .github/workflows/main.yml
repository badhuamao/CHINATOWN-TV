name: "实时订阅自动转换"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # 每6小时自动更新一次

jobs:
  update-nodes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: "调用转换后端并生成文件"
        run: |
          # 这一行是核心：直接利用成熟的后端，把你的源链接转成 Clash 格式
          # URL 进行了编码处理，确保转换成功
          curl -L "https://sub.id9.cc/sub?target=clash&url=https%3A%2F%2Fraw.githubusercontent.com%2FSupprise0901%2FFetch%2Frefs%2Fheads%2Fmain%2FSuperspeed.yaml&insert=false&config=https%3A%2F%2Fraw.githubusercontent.com%2FACL4SSR%2FACL4SSR%2Fmaster%2FClash%2Fconfig%2FACL4SSR_Online.ini&emoji=true&list=false&udp=true&tfo=false&scv=true&fdn=false&sort=false&new_name=true" -o clash.yaml

      - name: "检查文件是否有效"
        run: |
          if [ -s clash.yaml ]; then
            echo "✅ 文件获取成功"
          else
            echo "❌ 文件为空，转换失败"
            exit 1
          fi

      - name: "提交新节点"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add clash.yaml
          git commit -m "生日好运：节点实时同步 $(date)" || exit 0
          git push
