name: "最后一次信任-暴力提取版"

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/**'

jobs:
  convert-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "1. 检出仓库"
        uses: actions/checkout@v3

      - name: "2. 强力抓取并提取"
        run: |
          # 下载你指定的那个源文件
          curl -sL "https://raw.githubusercontent.com/Supprise0901/Fetch/refs/heads/main/Superspeed.yaml" > raw.txt
          
          # 手动构建 Clash 头部
          echo "proxies:" > clash.yaml
          
          # 关键一步：从 raw.txt 里只抓取 proxies 列表下面的节点内容
          # 我们不解析 YAML，我们只把包含关键参数的行抠出来
          grep -E "  - {name:|    name:|    type:|    server:|    port:|    password:|    sni:|    ssl:|    skip-cert-verify:" raw.txt >> clash.yaml
          
          # 补全电视端必须的策略组 (解决不可用问题)
          echo "proxy-groups:" >> clash.yaml
          echo "  - name: 🚀 自动选择" >> clash.yaml
          echo "    type: url-test" >> clash.yaml
          echo "    proxies:" >> clash.yaml
          # 自动抓取刚才提取的所有节点名称
          grep "name:" clash.yaml | sed 's/.*name: //g' | sed 's/["'\'']//g' | sed 's/^/      - /' >> clash.yaml
          echo "    url: http://www.gstatic.com/generate_204" >> clash.yaml
          echo "    interval: 300" >> clash.yaml
          echo "rules:" >> clash.yaml
          echo "  - MATCH,🚀 自动选择" >> clash.yaml

      - name: "3. 强制推送"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add clash.yaml
          git commit -m "暴力同步成功: $(date)" || exit 0
          git push
