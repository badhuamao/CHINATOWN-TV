- name: 调用转换后端并生成文件
        run: |
          # 1. 请务必将下面的链接放在单引号 '' 中，防止 shell 解析特殊字符
          SUB_URL='这里替换成你的订阅链接'
          
          # 2. 设置后端地址
          BACKEND='https://api.v1.mk/sub'
          
          # 3. 构造完整请求（对变量进行严格引用）
          # target=clash 代表转成 Clash 格式
          FULL_URL="${BACKEND}?target=clash&url=${SUB_URL}"
          
          echo "正在尝试连接后端获取配置..."
          
          # 4. 执行下载
          # -L: 跟随重定向
          # -f: HTTP 错误时返回非零退出码
          # -s: 静默模式
          # -o: 输出文件名
          curl -L -f -s -o config.yaml "$FULL_URL"
